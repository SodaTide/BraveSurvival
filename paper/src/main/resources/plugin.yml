name: BraveSurvival
version: '2.0.0'
main: xyz.mocoder.bravesurvival.paper.BraveSurvivalPlugin
api-version: '1.21'
description: 一个通过Mixin修改Minecraft游戏机制的Paper插件，大幅增加游戏难度
author: MCMocoder
website: https://github.com/EinsteinZheng/BraveSurvival
commands:
  bravesurvival:
    description: BraveSurvival插件命令
    usage: /bravesurvival [reload]
    permission: bravesurvival.command
permissions:
  bravesurvival.command:
    description: 允许使用BraveSurvival命令
    default: op
